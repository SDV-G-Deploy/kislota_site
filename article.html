<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kislota Digest — Article</title>
  <meta name="description" content="Kislota digest article view sourced from generated stable publish artifacts." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-bg-scene="lily" data-bg-mode="reading" data-bg-veil="0.46">
  <div class="bg-noise" aria-hidden="true"></div>

  <header class="site-header article-header">
    <div class="wrapper masthead">
      <a class="brand-lockup" href="index.html">
        <span class="brand-kicker">Kislota Digest</span>
        <span class="brand-wordmark">DIGEST ARTICLE</span>
        <span class="brand-meta" id="article-brand-meta">Stable publish artifact</span>
      </a>
      <a class="btn btn-ghost" href="index.html">← Back to front page</a>
    </div>
  </header>

  <main class="wrapper article-page">
    <article class="panel article-card" id="article-root">
      <p class="kicker" id="article-kicker">Digest summary · Provenance-first view</p>
      <h1 id="article-title">Loading article…</h1>
      <p class="article-deck" id="article-deck">Preparing selected story details.</p>

      <div class="meta-row" id="article-labels"></div>
      <p class="article-time" id="article-time"></p>
      <p class="article-smoke" id="article-smoke-status">Live smoke: checking feed…</p>

      <div class="article-content" id="article-content"></div>
    </article>
  </main>

  <script src="background-engine.js"></script>
  <script src="article.js"></script>
</body>
</html>
